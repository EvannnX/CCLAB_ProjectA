<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Coding Project</title>
  <!-- Load p5.js library from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f7f9fc;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #333;
    }

    #canvas-container {
      margin-top: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }

    #info-section {
      width: 800px;
      max-width: 90%;
      margin-top: 30px;
      padding: 30px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      box-sizing: border-box;
      margin-bottom: 60px;
      line-height: 1.6;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      color: #1a1a1a;
      border-bottom: 2px solid #eaeaea;
      padding-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 16px;
    }

    .placeholder-text {
      color: #888;
      font-style: italic;
    }
  </style>
</head>

<body>

  <!-- p5.js Canvas will be placed here -->
  <div id="canvas-container"></div>

  <!-- Introduction text space below -->
  <div id="info-section">
    <h1>Project Introduction</h1>
    <p class="placeholder-text">You can replace this placeholder text with your project description, instructions on how
      to interact with the sketch, or your personal thoughts.</p>
  </div>

  <!-- Load your sketch code -->
  <script src="sketch.js"></script>

</body>

</html>
